<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>VIANova App - Explora tu destino</title>
  <meta name="description" content="Descubre los mejores hoteles, restaurantes y sitios recreativos." />

  <link rel="icon" type="image/png" href="/logo.jpeg" />

  <!-- Fonts: Poppins for headings, Inter for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Ocultar absolutamente todo de Google Translate desde el inicio -->
  <style>
    body { top: 0 !important; }
    #google_translate_element, 
    .skiptranslate iframe, 
    .skiptranslate,
    .goog-te-banner-frame, 
    .goog-te-balloon-frame, 
    #goog-gt-tt { 
      display: none !important; 
      visibility: hidden !important; 
      opacity: 0 !important; 
      height: 0 !important; 
      width: 0 !important; 
      position: absolute !important; 
      top: -10000px !important; 
      pointer-events: none !important;
    }
    .goog-text-highlight { 
      background-color: transparent !important; 
      box-shadow: none !important; 
    }
  </style>
</head>

<body>
  <script type="text/javascript">
    if (typeof Node === 'function' && Node.prototype) {
      const originalRemoveChild = Node.prototype.removeChild;
      Node.prototype.removeChild = function(child) {
        if (child.parentNode !== this) return child;
        return originalRemoveChild.apply(this, arguments);
      };
      const originalInsertBefore = Node.prototype.insertBefore;
      Node.prototype.insertBefore = function(newNode, referenceNode) {
        if (referenceNode && referenceNode.parentNode !== this) return newNode;
        return originalInsertBefore.apply(this, arguments);
      };
    }
  </script>
  <!-- Google Translate Widget (Hidden) -->
  <div id="google_translate_element" style="display:none;"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'es', autoDisplay: false}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
